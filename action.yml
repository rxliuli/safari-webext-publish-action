name: 'Safari WebExtension Publish'
description: 'Sign and publish Safari web extensions (macOS + iOS) to App Store Connect'

inputs:
  mode:
    description: 'Operation mode: "build" (build+upload on macOS) or "submit" (create version + submit for review via API, works on Linux)'
    required: false
    default: 'build'
  project-path:
    description: 'Path to the Xcode project directory (required for build mode)'
    required: false
  bundle-identifier:
    description: 'Bundle identifier (e.g. com.example.my-extension)'
    required: true
  team-id:
    description: 'Apple Developer Team ID (required for build mode)'
    required: false
  app-signing-identity:
    description: 'Code signing identity (required for build mode)'
    required: false
  installer-signing-identity:
    description: 'Installer signing identity (required for build mode)'
    required: false
  macos-deployment-target:
    description: 'Minimum macOS deployment target'
    required: false
    default: '12.0'
  version:
    description: 'App version string to submit (required for submit mode, e.g. "1.2.3")'
    required: false
  release-notes:
    description: 'What''s New text for App Store (submit mode). Defaults to "Bug fixes and improvements."'
    required: false
    default: 'Bug fixes and improvements.'

runs:
  using: 'composite'
  steps:
    # ── BUILD MODE ──────────────────────────────────────────────

    - name: Check macOS version
      if: inputs.mode == 'build'
      shell: bash
      run: |
        MACOS_VERSION=$(sw_vers -productVersion)
        MAJOR=$(echo "$MACOS_VERSION" | cut -d. -f1)
        if [ "$MAJOR" -lt 26 ]; then
          echo "::error::macOS 26+ is required for Xcode 26 SDK (current: $MACOS_VERSION). Use runs-on: macos-26"
          exit 1
        fi
        echo "macOS $MACOS_VERSION — OK"

    - name: Detect project and platforms
      if: inputs.mode == 'build'
      shell: bash
      run: |
        XCODEPROJ=$(find "${{ inputs.project-path }}" -maxdepth 1 -name "*.xcodeproj" | head -1)
        if [ -z "$XCODEPROJ" ]; then
          echo "::error::No .xcodeproj found in ${{ inputs.project-path }}"
          exit 1
        fi
        PROJECT_NAME=$(basename "$XCODEPROJ" .xcodeproj)
        echo "SAFARI_WEBEXT_PROJECT_NAME=$PROJECT_NAME" >> "$GITHUB_ENV"

        SCHEMES=$(xcodebuild -project "$XCODEPROJ" -list -json 2>/dev/null \
          | python3 -c "import sys,json; print('\n'.join(json.load(sys.stdin)['project']['schemes']))")

        HAS_MACOS=false
        HAS_IOS=false
        MACOS_SCHEME=""
        IOS_SCHEME=""
        if echo "$SCHEMES" | grep -q "(macOS)"; then
          HAS_MACOS=true
          MACOS_SCHEME="$PROJECT_NAME (macOS)"
        fi
        if echo "$SCHEMES" | grep -q "(iOS)"; then
          HAS_IOS=true
          IOS_SCHEME="$PROJECT_NAME (iOS)"
        fi

        # Single-platform project: scheme has no platform suffix (e.g. wxt-module-safari-xcode with projectType: 'macos')
        if [ "$HAS_MACOS" = false ] && [ "$HAS_IOS" = false ]; then
          if echo "$SCHEMES" | grep -qx "$PROJECT_NAME"; then
            HAS_MACOS=true
            MACOS_SCHEME="$PROJECT_NAME"
          fi
        fi

        if [ "$HAS_MACOS" = false ] && [ "$HAS_IOS" = false ]; then
          echo "::error::No macOS or iOS scheme found in project. Available schemes: $(echo "$SCHEMES" | tr '\n' ', ')"
          exit 1
        fi

        echo "SAFARI_WEBEXT_HAS_MACOS=$HAS_MACOS" >> "$GITHUB_ENV"
        echo "SAFARI_WEBEXT_HAS_IOS=$HAS_IOS" >> "$GITHUB_ENV"
        echo "SAFARI_WEBEXT_MACOS_SCHEME=$MACOS_SCHEME" >> "$GITHUB_ENV"
        echo "SAFARI_WEBEXT_IOS_SCHEME=$IOS_SCHEME" >> "$GITHUB_ENV"
        echo "Detected platforms: macOS=$HAS_MACOS, iOS=$HAS_IOS"

    - name: Validate environment variables (build)
      if: inputs.mode == 'build'
      shell: bash
      run: |
        MISSING=""
        for var in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD \
                   APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
          if [ -z "${!var}" ]; then
            MISSING="$MISSING $var"
          fi
        done

        if [ "$SAFARI_WEBEXT_HAS_MACOS" = true ]; then
          for var in APPLE_MACOS_PROVISIONING_PROFILE_BASE64 APPLE_MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!var}" ]; then
              MISSING="$MISSING $var"
            fi
          done
        fi

        if [ "$SAFARI_WEBEXT_HAS_IOS" = true ]; then
          for var in APPLE_IOS_PROVISIONING_PROFILE_BASE64 APPLE_IOS_EXTENSION_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!var}" ]; then
              MISSING="$MISSING $var"
            fi
          done
        fi

        if [ -n "$MISSING" ]; then
          echo "::error::Missing required environment variables:$MISSING"
          exit 1
        fi

    - name: Setup certificates
      if: inputs.mode == 'build'
      shell: bash
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/safari-webext-signing.keychain-db"
        security create-keychain -p actions "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p actions "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"

        echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
        security import "$RUNNER_TEMP/cert.p12" \
          -P "$APPLE_CERTIFICATE_PASSWORD" \
          -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        rm "$RUNNER_TEMP/cert.p12"

        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN_PATH"

        mkdir -p ~/private_keys
        echo "$APPLE_API_KEY" | base64 --decode \
          > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

        echo "SAFARI_WEBEXT_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

    - name: Install macOS provisioning profiles
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_MACOS == 'true'
      shell: bash
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        install_profile() {
          local secret_b64="$1" local_name="$2" env_var="$3" ext="$4"
          echo "$secret_b64" | base64 --decode > "/tmp/$local_name"
          local uuid
          uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< "$(security cms -D -i "/tmp/$local_name")")
          mv "/tmp/$local_name" ~/Library/MobileDevice/Provisioning\ Profiles/"$uuid.$ext"
          echo "$env_var=$uuid" >> "$GITHUB_ENV"
        }

        install_profile "$APPLE_MACOS_PROVISIONING_PROFILE_BASE64" app.provisionprofile SAFARI_WEBEXT_APP_PROFILE provisionprofile
        install_profile "$APPLE_MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64" ext.provisionprofile SAFARI_WEBEXT_EXT_PROFILE provisionprofile

    - name: Install iOS provisioning profiles
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_IOS == 'true'
      shell: bash
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        install_profile() {
          local secret_b64="$1" local_name="$2" env_var="$3" ext="$4"
          echo "$secret_b64" | base64 --decode > "/tmp/$local_name"
          local uuid
          uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< "$(security cms -D -i "/tmp/$local_name")")
          mv "/tmp/$local_name" ~/Library/MobileDevice/Provisioning\ Profiles/"$uuid.$ext"
          echo "$env_var=$uuid" >> "$GITHUB_ENV"
        }

        install_profile "$APPLE_IOS_PROVISIONING_PROFILE_BASE64" ios_app.mobileprovision SAFARI_WEBEXT_IOS_APP_PROFILE mobileprovision
        install_profile "$APPLE_IOS_EXTENSION_PROVISIONING_PROFILE_BASE64" ios_ext.mobileprovision SAFARI_WEBEXT_IOS_EXT_PROFILE mobileprovision

    - name: Create entitlements
      if: inputs.mode == 'build'
      shell: bash
      run: |
        cat > "$RUNNER_TEMP/app.entitlements" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.application-identifier</key>
            <string>${{ inputs.team-id }}.${{ inputs.bundle-identifier }}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${{ inputs.team-id }}</string>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
        </dict>
        </plist>
        EOF

        cat > "$RUNNER_TEMP/ext.entitlements" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.application-identifier</key>
            <string>${{ inputs.team-id }}.${{ inputs.bundle-identifier }}.Extension</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${{ inputs.team-id }}</string>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Build and archive macOS
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_MACOS == 'true'
      shell: bash
      run: |
        cd "${{ inputs.project-path }}"
        xcodebuild -project "$SAFARI_WEBEXT_PROJECT_NAME.xcodeproj" \
          -scheme "$SAFARI_WEBEXT_MACOS_SCHEME" \
          -configuration Release \
          -archivePath "$RUNNER_TEMP/macOS.xcarchive" \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          MACOSX_DEPLOYMENT_TARGET=${{ inputs.macos-deployment-target }} \
          ARCHS="x86_64 arm64" \
          ONLY_ACTIVE_ARCH=NO

    - name: Sign and package macOS
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_MACOS == 'true'
      shell: bash
      run: |
        APP_PATH="$RUNNER_TEMP/macOS.xcarchive/Products/Applications/$SAFARI_WEBEXT_PROJECT_NAME.app"

        cp ~/Library/MobileDevice/Provisioning\ Profiles/"$SAFARI_WEBEXT_APP_PROFILE.provisionprofile" \
          "$APP_PATH/Contents/embedded.provisionprofile"

        EXT_APP=$(find "$APP_PATH" -path "*/PlugIns/*.appex" -maxdepth 3 | head -1)
        if [ -n "$EXT_APP" ]; then
          cp ~/Library/MobileDevice/Provisioning\ Profiles/"$SAFARI_WEBEXT_EXT_PROFILE.provisionprofile" \
            "$EXT_APP/Contents/embedded.provisionprofile"
          codesign --force --options runtime --timestamp \
            --entitlements "$RUNNER_TEMP/ext.entitlements" \
            --sign "${{ inputs.app-signing-identity }}" "$EXT_APP"
        fi

        codesign --force --options runtime --timestamp \
          --entitlements "$RUNNER_TEMP/app.entitlements" \
          --sign "${{ inputs.app-signing-identity }}" "$APP_PATH"
        codesign --verify --deep --strict "$APP_PATH"

        productbuild --component "$APP_PATH" /Applications \
          --sign "${{ inputs.installer-signing-identity }}" \
          --identifier "${{ inputs.bundle-identifier }}" \
          "$RUNNER_TEMP/macOS.pkg"

    - name: Upload macOS to App Store Connect
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_MACOS == 'true'
      shell: bash
      run: |
        xcrun altool --upload-app \
          --type osx \
          --file "$RUNNER_TEMP/macOS.pkg" \
          --apiKey "$APPLE_API_KEY_ID" \
          --apiIssuer "$APPLE_API_ISSUER"

    - name: Build iOS archive
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_IOS == 'true'
      shell: bash
      run: |
        cd "${{ inputs.project-path }}"
        xcodebuild -project "$SAFARI_WEBEXT_PROJECT_NAME.xcodeproj" \
          -scheme "$SAFARI_WEBEXT_IOS_SCHEME" \
          -configuration Release \
          -archivePath "$RUNNER_TEMP/iOS.xcarchive" \
          -sdk iphoneos \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Export iOS IPA
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_IOS == 'true'
      shell: bash
      run: |
        cat > "$RUNNER_TEMP/ExportOptions-iOS.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ inputs.team-id }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>${{ inputs.bundle-identifier }}</key>
                <string>${SAFARI_WEBEXT_IOS_APP_PROFILE}</string>
                <key>${{ inputs.bundle-identifier }}.Extension</key>
                <string>${SAFARI_WEBEXT_IOS_EXT_PROFILE}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
        </dict>
        </plist>
        EOF

        xcodebuild -exportArchive \
          -archivePath "$RUNNER_TEMP/iOS.xcarchive" \
          -exportOptionsPlist "$RUNNER_TEMP/ExportOptions-iOS.plist" \
          -exportPath "$RUNNER_TEMP/ios-export"

    - name: Upload iOS to App Store Connect
      if: inputs.mode == 'build' && env.SAFARI_WEBEXT_HAS_IOS == 'true'
      shell: bash
      run: |
        IPA_PATH=$(find "$RUNNER_TEMP/ios-export" -name "*.ipa" | head -1)
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "$APPLE_API_KEY_ID" \
          --apiIssuer "$APPLE_API_ISSUER"

    - name: Cleanup (build)
      if: inputs.mode == 'build' && always()
      shell: bash
      run: |
        security delete-keychain "$SAFARI_WEBEXT_KEYCHAIN" 2>/dev/null || true
        rm -rf ~/private_keys ~/Library/MobileDevice/Provisioning\ Profiles 2>/dev/null || true

    # ── SUBMIT MODE ─────────────────────────────────────────────

    - name: Validate inputs (submit)
      if: inputs.mode == 'submit'
      shell: bash
      run: |
        MISSING=""
        for var in APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
          if [ -z "${!var}" ]; then
            MISSING="$MISSING $var"
          fi
        done
        if [ -z "${{ inputs.version }}" ]; then
          MISSING="$MISSING version(input)"
        fi
        if [ -n "$MISSING" ]; then
          echo "::error::Missing required for submit mode:$MISSING"
          exit 1
        fi

    - name: Submit to App Store Connect
      if: inputs.mode == 'submit'
      shell: bash
      run: |
        set -euo pipefail

        # ── JWT generation ──
        KEY_PATH=$(mktemp)
        echo "$APPLE_API_KEY" | base64 --decode > "$KEY_PATH"
        trap "rm -f '$KEY_PATH'" EXIT

        base64url() {
          if command -v basenc &>/dev/null; then
            basenc --base64url -w0 | tr -d '='
          else
            base64 | tr '+/' '-_' | tr -d '=\n'
          fi
        }

        der_to_raw() {
          python3 -c "
        import sys
        d = sys.stdin.buffer.read()
        idx = 2
        r_len = d[idx + 1]; r = d[idx + 2:idx + 2 + r_len]; idx += 2 + r_len
        s_len = d[idx + 1]; s = d[idx + 2:idx + 2 + s_len]
        sys.stdout.buffer.write(r[-32:].rjust(32, b'\x00') + s[-32:].rjust(32, b'\x00'))
        "
        }

        generate_jwt() {
          local header payload header_b64 payload_b64 signature
          local now exp
          now=$(date +%s)
          exp=$((now + 1200))
          header='{"alg":"ES256","kid":"'"$APPLE_API_KEY_ID"'","typ":"JWT"}'
          payload='{"iss":"'"$APPLE_API_ISSUER"'","iat":'"$now"',"exp":'"$exp"',"aud":"appstoreconnect-v1"}'
          header_b64=$(echo -n "$header" | base64url)
          payload_b64=$(echo -n "$payload" | base64url)
          signature=$(echo -n "$header_b64.$payload_b64" | openssl dgst -sha256 -sign "$KEY_PATH" -binary | der_to_raw | base64url)
          echo "$header_b64.$payload_b64.$signature"
        }

        JWT=$(generate_jwt)
        API="https://api.appstoreconnect.apple.com/v1"
        AUTH="Authorization: Bearer $JWT"

        api_request() {
          local METHOD="$1" URL="$2" BODY="${3:-}"
          local HTTP_CODE RESPONSE TMPFILE
          TMPFILE=$(mktemp)
          if [ -n "$BODY" ]; then
            HTTP_CODE=$(curl -sg -o "$TMPFILE" -w "%{http_code}" -X "$METHOD" -H "$AUTH" -H "Content-Type: application/json" -d "$BODY" "$URL")
          else
            HTTP_CODE=$(curl -sg -o "$TMPFILE" -w "%{http_code}" -X "$METHOD" -H "$AUTH" -H "Content-Type: application/json" "$URL")
          fi
          RESPONSE=$(cat "$TMPFILE")
          rm -f "$TMPFILE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::API $METHOD $URL returned HTTP $HTTP_CODE: $RESPONSE" >&2
            return 1
          fi
          echo "$RESPONSE"
        }
        api_get() { api_request GET "$1"; }
        api_post() { api_request POST "$1" "$2"; }
        api_patch() { api_request PATCH "$1" "$2"; }

        # ── Find app ──
        echo "Looking up app with bundle ID: ${{ inputs.bundle-identifier }}"
        APP_RESPONSE=$(api_get "$API/apps?filter[bundleId]=${{ inputs.bundle-identifier }}")
        APP_ID=$(echo "$APP_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null || true)
        if [ -z "$APP_ID" ]; then
          echo "::error::App not found for bundle ID: ${{ inputs.bundle-identifier }}"
          exit 1
        fi
        echo "Found app ID: $APP_ID"

        # ── Process each platform ──
        VERSION_IDS=()

        submit_platform() {
          local PLATFORM="$1"
          local PLATFORM_DISPLAY="$2"

          echo ""
          echo "━━━ $PLATFORM_DISPLAY ━━━"

          # Regenerate JWT in case it expired during wait
          JWT=$(generate_jwt)
          AUTH="Authorization: Bearer $JWT"

          # Wait for latest build to finish processing (up to 15 minutes)
          echo "Waiting for $PLATFORM_DISPLAY build to finish processing..."
          local BUILD_ID=""
          local ATTEMPT=0
          local MAX_ATTEMPTS=30
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Regenerate JWT every 5 attempts to avoid expiry
            if [ $((ATTEMPT % 5)) -eq 0 ]; then
              JWT=$(generate_jwt)
              AUTH="Authorization: Bearer $JWT"
            fi

            local BUILDS_RESPONSE
            BUILDS_RESPONSE=$(api_get "$API/builds?filter[app]=$APP_ID&filter[processingState]=PROCESSING,VALID&filter[preReleaseVersion.platform]=$PLATFORM&sort=-uploadedDate&limit=1") || true

            local STATE
            STATE=$(echo "$BUILDS_RESPONSE" | python3 -c "
        import sys,json
        d=json.load(sys.stdin)
        if d.get('data'):
            b=d['data'][0]
            print(b['attributes']['processingState'] + ' ' + b['id'])
        else:
            print('NONE')
        " 2>/dev/null || echo "NONE")

            if [ "$STATE" = "NONE" ]; then
              echo "No build found for $PLATFORM_DISPLAY. Skipping."
              return 0
            fi

            BUILD_ID="${STATE#* }"
            local BUILD_STATE="${STATE%% *}"

            if [ "$BUILD_STATE" = "VALID" ]; then
              echo "Build $BUILD_ID is ready (VALID)"
              break
            fi

            echo "Build is still processing (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
            sleep 30
          done

          if [ -z "$BUILD_ID" ]; then
            echo "::warning::Timed out waiting for $PLATFORM_DISPLAY build. Skipping."
            return 0
          fi

          # Check existing versions
          local VERSIONS_RESPONSE
          VERSIONS_RESPONSE=$(api_get "$API/apps/$APP_ID/appStoreVersions?filter[platform]=$PLATFORM&filter[appStoreState]=PREPARE_FOR_SUBMISSION,WAITING_FOR_REVIEW,IN_REVIEW,ACCEPTED,DEVELOPER_REJECTED&limit=5")

          local VERSION_INFO
          VERSION_INFO=$(echo "$VERSIONS_RESPONSE" | python3 -c "
        import sys,json
        d=json.load(sys.stdin)
        if not d.get('data'):
            print('NONE')
        else:
            v=d['data'][0]
            state=v['attributes']['appStoreState']
            vid=v['id']
            vstr=v['attributes']['versionString']
            print(f'{state} {vid} {vstr}')
        " 2>/dev/null || echo "NONE")

          local VERSION_STATE="${VERSION_INFO%% *}"
          local REST="${VERSION_INFO#* }"
          local VERSION_ID="${REST%% *}"
          local VERSION_STR="${REST#* }"

          echo "Current version state: $VERSION_STATE"

          case "$VERSION_STATE" in
            WAITING_FOR_REVIEW|IN_REVIEW|ACCEPTED)
              echo "Version $VERSION_STR is $VERSION_STATE for $PLATFORM_DISPLAY. Skipping submission."
              return 0
              ;;
            DEVELOPER_REJECTED|PREPARE_FOR_SUBMISSION)
              echo "Updating existing version $VERSION_STR (state: $VERSION_STATE)..."
              # Update version string if different
              if [ "$VERSION_STR" != "${{ inputs.version }}" ]; then
                api_patch "$API/appStoreVersions/$VERSION_ID" '{
                  "data": {
                    "type": "appStoreVersions",
                    "id": "'"$VERSION_ID"'",
                    "attributes": {
                      "versionString": "${{ inputs.version }}"
                    }
                  }
                }' > /dev/null
                echo "Updated version string to ${{ inputs.version }}"
              fi
              ;;
            NONE)
              echo "Creating new version ${{ inputs.version }} for $PLATFORM_DISPLAY..."
              local CREATE_RESPONSE
              CREATE_RESPONSE=$(api_post "$API/appStoreVersions" '{
                "data": {
                  "type": "appStoreVersions",
                  "attributes": {
                    "platform": "'"$PLATFORM"'",
                    "versionString": "${{ inputs.version }}"
                  },
                  "relationships": {
                    "app": {
                      "data": {
                        "type": "apps",
                        "id": "'"$APP_ID"'"
                      }
                    }
                  }
                }
              }')
              VERSION_ID=$(echo "$CREATE_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              echo "Created version with ID: $VERSION_ID"
              ;;
          esac

          # Attach build to version
          echo "Attaching build $BUILD_ID to version..."
          api_patch "$API/appStoreVersions/$VERSION_ID/relationships/build" '{
            "data": {
              "type": "builds",
              "id": "'"$BUILD_ID"'"
            }
          }' > /dev/null
          echo "Build attached."

          # Set release notes (whatsNew)
          local LOC_RESPONSE LOC_ID
          LOC_RESPONSE=$(api_get "$API/appStoreVersions/$VERSION_ID/appStoreVersionLocalizations")
          LOC_ID=$(echo "$LOC_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])" 2>/dev/null || true)
          if [ -n "$LOC_ID" ]; then
            local ESCAPED_NOTES
            ESCAPED_NOTES=$(python3 -c "import json; print(json.dumps('${{ inputs.release-notes }}'))")
            api_patch "$API/appStoreVersionLocalizations/$LOC_ID" '{
              "data": {
                "type": "appStoreVersionLocalizations",
                "id": "'"$LOC_ID"'",
                "attributes": {
                  "whatsNew": '"$ESCAPED_NOTES"'
                }
              }
            }' > /dev/null
            echo "Release notes updated."
          fi

          # Submit for review
          echo "Submitting $PLATFORM_DISPLAY for review..."
          JWT=$(generate_jwt)
          AUTH="Authorization: Bearer $JWT"

          local SUBMIT_RESPONSE SUBMISSION_ID
          SUBMIT_RESPONSE=$(api_post "$API/reviewSubmissions" '{
            "data": {
              "type": "reviewSubmissions",
              "relationships": {
                "app": {
                  "data": {
                    "type": "apps",
                    "id": "'"$APP_ID"'"
                  }
                }
              }
            }
          }' 2>&1) || true

          SUBMISSION_ID=$(echo "$SUBMIT_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || true)
          if [ -z "$SUBMISSION_ID" ]; then
            echo "::warning::Failed to create review submission for $PLATFORM_DISPLAY. Response: $SUBMIT_RESPONSE"
            return 0
          fi

          api_post "$API/reviewSubmissionItems" '{
            "data": {
              "type": "reviewSubmissionItems",
              "relationships": {
                "reviewSubmission": {
                  "data": {
                    "type": "reviewSubmissions",
                    "id": "'"$SUBMISSION_ID"'"
                  }
                },
                "appStoreVersion": {
                  "data": {
                    "type": "appStoreVersions",
                    "id": "'"$VERSION_ID"'"
                  }
                }
              }
            }
          }' > /dev/null

          local CONFIRM_RESPONSE
          CONFIRM_RESPONSE=$(api_patch "$API/reviewSubmissions/$SUBMISSION_ID" '{
            "data": {
              "type": "reviewSubmissions",
              "id": "'"$SUBMISSION_ID"'",
              "attributes": {
                "submitted": true
              }
            }
          }' 2>&1) || true

          if echo "$CONFIRM_RESPONSE" | python3 -c "import sys,json; json.load(sys.stdin)['data']" &>/dev/null; then
            echo "✅ $PLATFORM_DISPLAY v${{ inputs.version }} submitted for review!"
          else
            echo "::warning::Failed to confirm review for $PLATFORM_DISPLAY. Response: $CONFIRM_RESPONSE"
          fi
        }

        # Process both platforms
        submit_platform "MAC_OS" "macOS"
        submit_platform "IOS" "iOS"

        echo ""
        echo "Done."
